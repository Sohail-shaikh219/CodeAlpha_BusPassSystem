<!DOCTYPE html>
<html>

<head>
    <title>Bus Pass System</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #0f172a, #1e293b);
            color: white;
            text-align: center;
            padding-top: 100px;
        }

        .container {
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            display: inline-block;
        }

        input,
        button {
            padding: 10px;
            margin: 10px;
            border-radius: 10px;
            border: none;
            width: 80%;
        }

        button {
            background: #38bdf8;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #0ea5e9;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🚌 Bus Pass System</h1>

        <form action="/generate" method="POST">
            <input type="text" name="name" placeholder="Enter Name" required><br>
            <input type="text" name="route" placeholder="Enter Route" required><br>
            <input type="date" name="date" required><br>
            <button type="submit">Generate Pass</button>
        </form>
    </div>

</body>

</html>
